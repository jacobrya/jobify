basePath: /api/v1
definitions:
  domain.Application:
    properties:
      applied_at:
        type: string
      id:
        type: string
      job:
        $ref: '#/definitions/domain.Job'
      job_id:
        type: string
      note:
        type: string
      status:
        $ref: '#/definitions/domain.ApplicationStatus'
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  domain.ApplicationStatus:
    enum:
    - saved
    - applied
    - interview
    - offer
    - rejected
    type: string
    x-enum-varnames:
    - StatusSaved
    - StatusApplied
    - StatusInterview
    - StatusOffer
    - StatusRejected
  domain.DeveloperProfile:
    properties:
      bio:
        type: string
      experience_years:
        type: integer
      github_url:
        type: string
      id:
        type: string
      name:
        type: string
      remote_only:
        type: boolean
      salary_max:
        type: integer
      salary_min:
        type: integer
      skills:
        items:
          type: string
        type: array
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  domain.Job:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_remote:
        type: boolean
      location:
        type: string
      salary_max:
        type: integer
      salary_min:
        type: integer
      skills:
        items:
          type: string
        type: array
      source:
        type: string
      source_id:
        type: string
      title:
        type: string
      url:
        type: string
      views_count:
        type: integer
    type: object
  domain.JobWithMatch:
    properties:
      company:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      is_remote:
        type: boolean
      location:
        type: string
      match_percent:
        type: integer
      matched_skills:
        items:
          type: string
        type: array
      missing_skills:
        items:
          type: string
        type: array
      salary_max:
        type: integer
      salary_min:
        type: integer
      skills:
        items:
          type: string
        type: array
      source:
        type: string
      source_id:
        type: string
      title:
        type: string
      url:
        type: string
      views_count:
        type: integer
    type: object
  domain.Role:
    enum:
    - developer
    - admin
    type: string
    x-enum-varnames:
    - RoleDeveloper
    - RoleAdmin
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        $ref: '#/definitions/domain.Role'
      updated_at:
        type: string
    type: object
  handler.createAppRequest:
    properties:
      job_id:
        type: string
      note:
        type: string
    type: object
  handler.createJobRequest:
    properties:
      company:
        type: string
      description:
        type: string
      is_remote:
        type: boolean
      location:
        type: string
      salary_max:
        type: integer
      salary_min:
        type: integer
      skills:
        items:
          type: string
        type: array
      title:
        type: string
      url:
        type: string
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.registerRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.updateProfileRequest:
    properties:
      bio:
        type: string
      experience_years:
        type: integer
      github_url:
        type: string
      name:
        type: string
      remote_only:
        type: boolean
      salary_max:
        type: integer
      salary_min:
        type: integer
      skills:
        items:
          type: string
        type: array
    type: object
  handler.updateStatusRequest:
    properties:
      status:
        $ref: '#/definitions/domain.ApplicationStatus'
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      pages:
        type: integer
      total:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      error:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: IT job platform REST API with skill matching and application tracking.
  title: Jobify API
  version: "1.0"
paths:
  /applications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.Application'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List the current user's applications
      tags:
      - applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createAppRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Application'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Save/apply to a job
      tags:
      - applications
  /applications/{id}:
    delete:
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Delete an application
      tags:
      - applications
    put:
      consumes:
      - application/json
      parameters:
      - description: Application UUID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update application status
      tags:
      - applications
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Exchange credentials for a JWT
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Register a new developer account
      tags:
      - auth
  /jobs:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: limit
        type: integer
      - description: Comma-separated skills filter
        in: query
        name: skills
        type: string
      - description: Only remote jobs
        in: query
        name: remote
        type: boolean
      - description: Minimum salary
        in: query
        name: salary_min
        type: integer
      - description: Maximum salary
        in: query
        name: salary_max
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.Job'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List jobs with filters and pagination
      tags:
      - jobs
    post:
      consumes:
      - application/json
      parameters:
      - description: Job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createJobRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Job'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create a new job (admin only)
      tags:
      - jobs
  /jobs/{id}:
    delete:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Delete a job (admin only)
      tags:
      - jobs
    get:
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.JobWithMatch'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get a job by ID with skill match against current user
      tags:
      - jobs
    put:
      consumes:
      - application/json
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      - description: Job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createJobRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.Job'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update an existing job (admin only)
      tags:
      - jobs
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get the current user's profile
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: Profile fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/domain.DeveloperProfile'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update the current user's developer profile
      tags:
      - users
  /saved-jobs:
    get:
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List saved jobs
      tags:
      - saved-jobs
    post:
      consumes:
      - application/json
      parameters:
      - description: Job ID
        in: body
        name: body
        required: true
        schema:
          properties:
            job_id:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Save a job
      tags:
      - saved-jobs
  /saved-jobs/{job_id}:
    delete:
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Unsave a job
      tags:
      - saved-jobs
securityDefinitions:
  BearerAuth:
    description: Type "Bearer {token}" (token is returned by /auth/login).
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
